name: CI/CD Pipeline
on:
  push:
    branches: [ main ]

jobs:

  # ============================================
  # ETAPA DE CI — Integração Contínua
  # ============================================
  integracao-continua:
    name: Integração Contínua (CI)
    runs-on: ubuntu-latest

    steps:

    
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes unitários
        run: pytest

  # ============================================
  # ETAPA DE CD — Entrega Contínua
  # Só roda se as 3 etapas de CI passarem!
  # ============================================
  entrega-continua:
    name: Entrega Contínua (CD)
    runs-on: ubuntu-latest
    needs: integracao-continua

    steps:

      
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

 
      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gilsonLopes:27-06-26
